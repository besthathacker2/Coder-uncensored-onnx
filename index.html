<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Qwen3 Coding Agent</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"/>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Inter,Arial,sans-serif;
    height:100vh;
    overflow:hidden;
}

header{
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    background:#161b22;
    border-bottom:1px solid #30363d;
}

header h1{
    font-size:20px;
    margin:0;
}

main{
    display:grid;
    grid-template-columns:350px 1fr 1fr;
    height:calc(100vh - 60px);
}

.sidebar{
    border-right:1px solid #30363d;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.editor-panel{
    border-right:1px solid #30363d;
    display:flex;
    flex-direction:column;
}

.preview-panel{
    display:flex;
    flex-direction:column;
}

.section{
    padding:14px;
    border-bottom:1px solid #30363d;
}

textarea{
    width:100%;
    min-height:120px;
    resize:vertical;
    background:#0d1117;
    color:white;
    border:1px solid #30363d;
    border-radius:10px;
    padding:12px;
}

button{
    border:none;
    background:#238636;
    color:white;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

.file-list{
    flex:1;
    overflow:auto;
}

.file-item{
    padding:10px 14px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.file-item:hover{
    background:#161b22;
}

.active-file{
    background:#1f2937;
}

.editor{
    flex:1;
    overflow:auto;
}

pre{
    margin:0;
    height:100%;
}

code{
    min-height:100%;
}

iframe{
    flex:1;
    border:none;
    background:white;
}

.toolbar{
    padding:10px;
    display:flex;
    gap:10px;
    border-bottom:1px solid #30363d;
}

.status{
    font-size:13px;
    opacity:0.7;
}

input[type='password']{
    width:100%;
    background:#0d1117;
    color:white;
    border:1px solid #30363d;
    border-radius:10px;
    padding:10px;
}

.chat{
    height:220px;
    overflow:auto;
    padding:10px;
}

.msg{
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;
}

.user{
    background:#1f2937;
}

.ai{
    background:#111827;
}
</style>
</head>
<body>

<header>
<h1>Qwen3 Coding Agent</h1>
<div class="status" id="status">Ready</div>
</header>

<main>

<div class="sidebar">

<div class="section">
<input
type="file"
id="imageUpload"
accept="image/*"
/>

<img id="previewImage"
style="max-width:100%;margin-top:10px;border-radius:10px;">

<textarea id="prompt"
placeholder="Describe the app you want..."></textarea>

<button onclick="generateProject()">
Generate Project
</button>

<button onclick="voicePrompt()">
Voice Prompt
</button>
</div>

<div class="chat" id="chat"></div>

<div class="file-list" id="fileList"></div>

</div>

<div class="editor-panel">

<div class="toolbar">
<button onclick="saveProject()">Save</button>
<button onclick="loadProject()">Load</button>
<button onclick="downloadProject()">Export</button>
<button onclick="runPreview()">Run</button>
</div>

<div class="editor">
<div id="monacoEditor"
style="width:100%;height:100%;"></div>
</div>

</div>

<div class="preview-panel">
<iframe id="preview"></iframe>
</div>

</main>

<script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script type="module">
import { WebContainer } from 'https://cdn.jsdelivr.net/npm/@webcontainer/api/+esm';
window.webcontainer = await WebContainer.boot();
console.log('WebContainer Ready');
</script>

<script>
const key = "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"
let files = {
    "index.html":""
};

let currentFile = "index.html";

function setStatus(text){
    document.getElementById("status").textContent = text;
}

function addMessage(type,text){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    document.getElementById("chat").appendChild(div);
}

function refreshFiles(){

    const list = document.getElementById("fileList");
    list.innerHTML = "";

    Object.keys(files).forEach(file=>{

        const div = document.createElement("div");

        div.className =
            "file-item " +
            (currentFile === file ? "active-file":"");

        div.textContent = file;

        div.onclick = ()=>{
            currentFile = file;
            openFile();
            refreshFiles();
        };

        list.appendChild(div);
    });
}

function openFile(){

    if(window.monacoEditor){
        monacoEditor.setValue(
            files[currentFile] || ''
        );
    }
}

require.config({
    paths:{
        vs:'https://unpkg.com/monaco-editor@latest/min/vs'
    }
});

require(['vs/editor/editor.main'],()=>{

    window.monacoEditor = monaco.editor.create(
        document.getElementById('monacoEditor'),
        {
            value:'',
            language:'html',
            theme:'vs-dark',
            automaticLayout:true,
            minimap:{enabled:true}
        }
    );

    openFile();

});

function runPreview(){

    if(window.monacoEditor){
        files[currentFile] =
            monacoEditor.getValue();
    }

    const html = files['index.html'] || '';

    document.getElementById('preview').srcdoc = html;

}

async function startNodeProject(){

    await webcontainer.mount({

        'package.json':{
            file:{
                contents:JSON.stringify({
                    name:'app',
                    type:'module',
                    dependencies:{
                        express:'latest'
                    }
                })
            }
        },

        'server.js':{
            file:{
                contents:`
import express from 'express';

const app = express();

app.get('/',(req,res)=>{
  res.send('AI Agent Running');
});

app.listen(3000);
`
            }
        }
    });

    const install = await webcontainer.spawn(
        'npm',['install']
    );

    await install.exit;

    await webcontainer.spawn(
        'node',['server.js']
    );
}

function applyPatches(patches){

    patches.forEach(patch=>{

        files[patch.file] =
            files[patch.file].replace(
                patch.search,
                patch.replace
            );

    });

    openFile();
    runPreview();
}

async function patchProject(userRequest){

    const response = await fetch(
        'https://openrouter.ai/api/v1/chat/completions',
        {
            method:'POST',

            headers:{
                'Authorization':'Bearer ' + key,
                'Content-Type':'application/json',
                'HTTP-Referer':location.origin,
                'X-Title':'Qwen Coding Agent'
            },

            body:JSON.stringify({

                model:'qwen/qwen3-coder:free',

                messages:[
                    {
                        role:'system',
                        content:
                        'Return ONLY valid runnable HTML code.'
                    },
                    {
                        role:'user',
                        content:prompt
                    }
                ]
            })
        }
    );

    const data = await response.json();

    const patches = JSON.parse(
        data.choices[0].message.content
    );

    applyPatches(patches);
}


async function generateProject(){

    const prompt = document.getElementById("prompt").value;

    addMessage("user",prompt);

    setStatus("Generating...");

    const response = await fetch(
        "https://openrouter.ai/api/v1/chat/completions",
        {
            method:"POST",
            headers:{
                "Authorization":"Bearer " + key,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                model:"qwen/qwen3-coder:free",
                messages:[
                    {
                        role:"system",
                        content:
                           `You are a powerful coding agent.
                            Return a COMPLETE runnable HTML app.
                            Include CSS and JS inline.
                            Return ONLY code.`
                    },
                    {
                        role:"user",
                        content:prompt
                    }
                ]
            })
        }
    );

    const data = await response.json();

    let code =
        data.choices?.[0]?.message?.content || "";

    code = code
        .replace(/```html/g,"")
        .replace(/```/g,"");

    files["index.html"] = code;

    currentFile = "index.html";

    document
.getElementById('imageUpload')
.addEventListener('change',e=>{

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = ()=>{

        document
        .getElementById('previewImage')
        .src = reader.result;

        window.imageBase64 = reader.result;
    };

    reader.readAsDataURL(file);

});

refreshFiles();
openFile();
    runPreview();

    addMessage("ai","Project generated successfully");

    setStatus("Ready");
}

function saveProject(){

    localStorage.setItem(
        "qwen-agent-project",
        JSON.stringify(files)
    );

    setStatus("Saved locally");
}

function loadProject(){

    const data = localStorage.getItem(
        "qwen-agent-project"
    );

    if(!data) return;

    files = JSON.parse(data);

    refreshFiles();
    openFile();
    runPreview();

    setStatus("Loaded");
}

function downloadProject(){

    const blob = new Blob(
        [files["index.html"]],
        {type:"text/html"}
    );

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = "project.html";

    a.click();
}

function voicePrompt(){

    if(!window.SpeechRecognition &&
       !window.webkitSpeechRecognition){
        alert("Speech recognition unsupported");
        return;
    }

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    const recognition = new SpeechRecognition();

    recognition.lang = "en-US";

    recognition.onresult = (event)=>{

        document.getElementById("prompt").value =
            event.results[0][0].transcript;
    };

    recognition.start();
}

refreshFiles();
openFile();

</script>

</body>
</html>
