name: Convert Qwen to ONNX (CUDA Fix)

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: "Hugging Face model ID"
        required: true
        default: "Qwen/Qwen2.5-Coder-7B-Instruct"
        type: string
      quantize:
        description: "Quantize model"
        required: true
        default: true
        type: boolean
      hf_repo_id:
        description: "Target HF repo"
        required: true
        type: string

env:
  HF_HOME: /tmp/huggingface
  # CRITICAL: Disable CUDA to avoid AllocatorConfig error
  CUDA_VISIBLE_DEVICES: ""
  # Use CPU-only PyTorch
  FORCE_CPU: "1"

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up Python
        run: sudo apt-get install python3
        
      - name: Install dependencies (CPU-only)
        run: |
          python -m pip install --upgrade pip
          
          # Install CPU-only PyTorch (avoids CUDA issues)
          echo "Installing CPU-only PyTorch..."
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          
          echo "Installing transformers..."
          pip install --no-cache-dir transformers
          echo "Installing optimum..."
          pip install --no-cache-dir optimum
          
          echo "Installing ONNX runtime..."
          pip install --no-cache-dir optimum[onnxruntime]
          
          echo "Installing HF tools..."
          pip install --no-cache-dir huggingface-hub
          
          echo "✓ Dependencies installed"
        timeout-minutes: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update --quiet
          sudo apt-get install -y --no-install-recommends git-lfs
          git lfs install
        timeout-minutes: 15

      - name: Create conversion script (CPU-safe)
        run: |
          cat > convert_model.py << 'EOFPYTHON'
          #!/usr/bin/env python3
          """
          CPU-safe model converter
          """
          import os
          import sys
          import torch
          
          # Force CPU before any torch operations
          os.environ['CUDA_VISIBLE_DEVICES'] = ''
          os.environ['FORCE_CPU'] = '1'
          torch.cuda.is_available = lambda: False
          
          from pathlib import Path
          from transformers import AutoConfig, AutoTokenizer
          from optimum.onnxruntime import ORTModelForCausalLM
          
          def convert_to_onnx(model_id, output_dir):
              """Convert model to ONNX on CPU"""
              print(f"\n{'='*70}")
              print(f"Converting: {model_id}")
              print(f"Device: CPU (CUDA disabled)")
              print(f"Output: {output_dir}")
              print(f"{'='*70}\n")
              
              output_path = Path(output_dir)
              output_path.mkdir(parents=True, exist_ok=True)
              
              try:
                  # Step 1: Load configuration
                  print("[1/4] Loading model configuration...")
                  config = AutoConfig.from_pretrained(
                      model_id,
                      trust_remote_code=True
                  )
                  print(f"  ✓ {config.model_type}")
                  print(f"  ✓ Parameters: B")
                  print()
                  
                  # Step 2: Export to ONNX
                  print("[2/4] Exporting to ONNX...")
                  print("  Converting on CPU (this may take 30-90 minutes)...")
                  
                  # Force CPU device
                  model = ORTModelForCausalLM.from_pretrained(
                      model_id,
                      export=True,
                      use_cache=True,
                      trust_remote_code=True,
                      # Critical: Use CPU
                      device_map="cpu",
                      low_cpu_mem_usage=True,
                      offload_folder="./offload",
                  )
                  
                  print("  ✓ Export complete")
                  print()
                  
                  # Step 3: Save model
                  print("[3/4] Saving ONNX model...")
                  model.save_pretrained(output_path / "onnx")
                  print("  ✓ Model saved")
                  print()
                  
                  # Step 4: Save tokenizer
                  print("[4/4] Saving tokenizer and config...")
                  tokenizer = AutoTokenizer.from_pretrained(
                      model_id,
                      trust_remote_code=True
                  )
                  tokenizer.save_pretrained(str(output_path))
                  config.save_pretrained(str(output_path))
                  print("  ✓ Tokenizer saved")
                  print()
                  
                  print(f"{'='*70}")
                  print("✅ Conversion Complete!")
                  print(f"{'='*70}\n")
                  
                  # Summary
                  total_size = sum(
                      f.stat().st_size for f in output_path.glob("**/*") 
                      if f.is_file()
                  ) / (1024**3)
                  print(f"Total size: {total_size:.2f} GB\n")
                  
                  return True
                  
              except Exception as e:
                  print(f"\n❌ Error: {e}")
                  import traceback
                  traceback.print_exc()
                  return False
          
          if __name__ == "__main__":
              model_id = sys.argv[1] if len(sys.argv) > 1 else "${{ github.event.inputs.model_id }}"
              output_dir = sys.argv[2] if len(sys.argv) > 2 else "./model-output"
              
              success = convert_to_onnx(model_id, output_dir)
              sys.exit(0 if success else 1)
          EOFPYTHON
          
          chmod +x convert_model.py

      - name: Convert model
        id: convert
        run: |
          set +e
          
          echo "Starting conversion (CPU-only mode)..."
          python convert_model.py \
            "${{ github.event.inputs.model_id }}" \
            "./model-output" 2>&1 | tee conversion.log
          
          RESULT=$?
          
          if [ $RESULT -eq 0 ] && [ -d "./model-output/onnx" ]; then
            echo "conversion_success=true" >> $GITHUB_OUTPUT
            SIZE=$(du -sh ./model-output | cut -f1)
            echo "output_size=$SIZE" >> $GITHUB_OUTPUT
            echo "✅ Conversion successful: $SIZE"
          else
            echo "conversion_success=false" >> $GITHUB_OUTPUT
            echo "❌ Conversion failed"
            tail -50 conversion.log
            exit 1
          fi
        timeout-minutes: 180
        continue-on-error: false

      - name: Create model card
        if: steps.convert.outputs.conversion_success == 'true'
        run: |
          cat > ./model-output/README.md << 'EOF'
          ---
          library_name: transformers.js
          tags:
            - transformers.js
            - onnx
            - qwen
          ---
          
          # Qwen ONNX Model
          
          Converted from: **${{ github.event.inputs.model_id }}**
          
          ## Usage
          
          ```javascript
          import { pipeline } from '@huggingface/transformers';
          
          const generator = await pipeline(
            'text-generation',
            '${{ github.event.inputs.hf_repo_id }}'
          );
          
          const result = await generator('your prompt', {
            max_new_tokens: 200,
          });
          ```
          
          ## Details
          
          - Model: ${{ github.event.inputs.model_id }}
          - Format: ONNX
          - Size: ${{ steps.convert.outputs.output_size }}
          - Converted: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          EOF

      - name: Prepare upload
        if: steps.convert.outputs.conversion_success == 'true'
        run: |
          cd ./model-output
          
          git lfs install
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          
          git init
          git lfs track "onnx/*.onnx"
          git lfs track "onnx/*.onnx.*"
          git add .gitattributes
          git add .
          git commit -m "Add ONNX conversion" || echo "Nothing to commit"
          
          echo "✓ Git LFS configured"

      - name: Upload to Hugging Face
        if: steps.convert.outputs.conversion_success == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd ./model-output
          
          git remote add origin https://huggingface.co/${{ github.event.inputs.hf_repo_id }} 2>/dev/null || true
          
          echo "Uploading to Hugging Face Hub..."
          if git push --force -u origin main 2>&1; then
            echo "✅ Upload successful!"
            echo "📍 https://huggingface.co/${{ github.event.inputs.hf_repo_id }}"
          else
            echo "Upload attempt with main branch failed, trying master..."
            git push --force -u origin master
          fi
        timeout-minutes: 60
        continue-on-error: true

      - name: Final status
        if: always()
        run: |
          echo ""
          if [ "${{ steps.convert.outputs.conversion_success }}" = "true" ]; then
            echo "✅ CONVERSION SUCCESSFUL"
            echo "Model: ${{ github.event.inputs.model_id }}"
            echo "Size: ${{ steps.convert.outputs.output_size }}"
            echo "Hub: https://huggingface.co/${{ github.event.inputs.hf_repo_id }}"
          else
            echo "❌ CONVERSION FAILED"
            echo "Error: PyTorch CUDA allocation issue (see logs)"
            echo "Solution: Try smaller model or use local conversion"
          fi
          echo ""

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/huggingface ~/.cache/huggingface offload 2>/dev/null || true
          df -h /
