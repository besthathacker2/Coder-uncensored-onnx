name: Export Transformers Model to ONNX

on:
  workflow_dispatch:  # Allows manual triggering
  push:
    branches:
      - main

jobs:
  export-onnx:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install transformers optimum optimum[onnxruntime] accelerate

      # Step 4: Export model to ONNX
      - name: Export Qwen3 Model to ONNX
        run: |
          python - <<EOF
          from transformers import AutoModelForCausalLM, AutoTokenizer
          from optimum.onnxruntime import ORTModelForCausalLM

          model_name = "mradermacher/Qwen3-42B-A3B-2507-Thinking-Abliterated-uncensored-TOTAL-RECALL-v2-Medium-MASTER-CODER-i1-GGUF"
          output_dir = "./onnx_model"

          print(f"Loading model {model_name}...")
          model = AutoModelForCausalLM.from_pretrained(model_name)
          tokenizer = AutoTokenizer.from_pretrained(model_name)

          print("Exporting to ONNX...")
          ort_model = ORTModelForCausalLM.from_transformers(model)
          ort_model.save_pretrained(output_dir)
          tokenizer.save_pretrained(output_dir)
          print(f"ONNX model saved to {output_dir}")
          EOF

      # Step 5: Optionally, upload ONNX model as artifact
      - name: Upload ONNX model
        uses: actions/upload-artifact@v4
        with:
          name: onnx-model
          path: ./onnx_model
