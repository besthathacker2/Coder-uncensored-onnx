name: Build & Deploy Qwen2.5 WASM Chatbot

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true  # fetch llama.cpp if it's a submodule

    - name: Setup Emscripten
      uses: emscripten/emsdk-action@v3

    - name: Clone llama.cpp
      run: |
        git clone --depth=1 https://github.com/ggerganov/llama.cpp.git llama.cpp

    - name: Clone model repo
      run: |
        mkdir -p models
        # Example: Replace with actual GGUF model URL
        wget -O models/Qwen2.5-Coder-7B-Instruct-Uncensored.gguf "https://huggingface.co/BlossomsAI/Qwen2.5-Coder-7B-Instruct-Uncensored-GGUF/resolve/main/q4_k_s.gguf"

    - name: Build llama.cpp WASM
      run: |
        cd llama.cpp
        mkdir -p build-wasm
        cd build-wasm
        emcmake cmake ..
        emmake make
        # Copy wasm artifacts to deployment folder
        mkdir -p ../deploy/wasm
        cp main.wasm ../deploy/wasm/
        cp main.js ../deploy/wasm/

    - name: Prepare deployment folder
      run: |
        mkdir -p deploy/models
        cp models/Qwen2.5-Coder-7B-Instruct-Uncensored.gguf deploy/models/
        # Create index.html dynamically
        cat > deploy/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
        <meta charset="UTF-8">
        <title>Qwen2.5-Coder WASM Chatbot</title>
        <style>
        body { font-family: sans-serif; padding: 2em; }
        textarea { width: 100%; }
        pre { background: #f0f0f0; padding: 1em; white-space: pre-wrap; }
        </style>
        </head>
        <body>
        <h1>Qwen2.5-Coder-7B WASM Chatbot</h1>
        <textarea id="prompt" placeholder="Ask a coding question..." rows="4"></textarea>
        <button onclick="generate()">Send</button>
        <pre id="response"></pre>

        <script src="wasm/main.js"></script>
        <script>
        let model;
        async function loadModel() {
            model = await Llama.loadModel('models/Qwen2.5-Coder-7B-Instruct-Uncensored.gguf');
        }
        async function generate() {
            const prompt = document.getElementById('prompt').value;
            document.getElementById('response').innerText = "Generating...";
            const output = await model.generate(prompt);
            document.getElementById('response').innerText = output;
        }
        loadModel();
        </script>
        </body>
        </html>
        EOF

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v6
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./deploy
